<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — Bonos de Regalo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #1a1a2e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 44px 40px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.4);
      text-align: center;
    }
    .logo { font-size: 32px; margin-bottom: 6px; }
    .titulo { font-size: 20px; font-weight: 800; color: #1a1a2e; margin-bottom: 4px; }
    .subtitulo { font-size: 13px; color: #aaa; margin-bottom: 30px; }
    label { display: block; text-align: left; font-size: 12px; font-weight: 600; color: #555; margin-bottom: 6px; }
    input[type=password] {
      width: 100%;
      padding: 13px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      margin-bottom: 18px;
      transition: border-color 0.2s;
    }
    input[type=password]:focus { border-color: #1a1a2e; }
    button {
      width: 100%;
      padding: 14px;
      background: #1a1a2e;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #2e3555; }
    .error {
      background: #fdecea;
      color: #b71c1c;
      border: 1px solid #ef9a9a;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
    }
    .footer { margin-top: 24px; font-size: 12px; color: #ccc; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🎁</div>
    <div class="titulo">Bonos de Regalo</div>
    <div class="subtitulo">Panel de administración</div>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
      <label>Contraseña</label>
      <input type="password" name="password" placeholder="••••••••" autofocus />
      <button type="submit">Ingresar</button>
    </form>

    <div class="footer">Acceso restringido a administradores</div>
  </div>
</body>
</html>
